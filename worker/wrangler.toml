name = "lancefall-leaderboard"
main = "src/index.ts"
compatibility_date = "2024-09-23"

# D1 database "lancefall" (provisioned via the Cloudflare MCP; schema applied).
[[d1_databases]]
binding = "DB"
database_name = "lancefall"
database_id = "8142e75f-a9a7-46e6-a939-558db73adae2"

# KV namespace "lancefall-rl" for IP rate-limiting (provisioned via the MCP).
[[kv_namespaces]]
binding = "RL"
id = "6aa41e3558344759aec349d3c233948c"

# ── Player accounts (cloud save) ──
# Requires a secret HMAC key for stateless signed sessions. Set it for prod with:
#   npx wrangler secret put HMAC_SECRET
# For local `wrangler dev`, put it in worker/.dev.vars (gitignored; see .dev.vars.example).
# P2 adds the OAuth client id/secret vars (see ACCOUNTS-SETUP.md).
