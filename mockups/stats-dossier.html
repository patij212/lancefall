<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>LANCEFALL — STATS dossier (design mockup v2)</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Rajdhani:wght@500;600;700&family=Orbitron:wght@400;700;900&family=Inter:wght@400;500;600;700&display=swap');
* { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --c: #22d3ee; --p: #818cf8; --s: #f472b6; --o: #fb923c; --g: #4ade80;
  --bg: #03050d; --panel: rgba(8,12,28,0.94);
  --label-1: #6d89ab; --label-2: #7a93b2; --label-3: #8aa0bd;
}
body { background: var(--bg); color: #c8d6f0; font-family: 'Inter','Segoe UI',system-ui,sans-serif; min-height: 100vh; padding: 28px 20px; overflow-x: hidden; }
body::before { content:''; position: fixed; inset: 0; z-index: 0; pointer-events: none;
  background: radial-gradient(ellipse 70% 55% at 12% 30%, rgba(34,211,238,0.04) 0%, transparent 70%),
              radial-gradient(ellipse 70% 55% at 88% 70%, rgba(129,140,248,0.04) 0%, transparent 70%),
              radial-gradient(ellipse 90% 55% at 50% 120%, rgba(34,211,238,0.05) 0%, transparent 60%); }
.wrap { position: relative; z-index: 1; max-width: 1140px; margin: 0 auto; }

/* mockup toolbar */
.mock-bar { display: flex; align-items: center; gap: 10px; margin-bottom: 18px; flex-wrap: wrap; }
.mock-tag { font-family:'Rajdhani',monospace; font-size: 10px; font-weight: 700; letter-spacing: 0.18em; text-transform: uppercase; color: #0a1020; background: var(--c); padding: 4px 10px; border-radius: 5px; }
.mock-note { font-size: 11px; color: var(--label-2); font-style: italic; }
.mock-spacer { flex: 1; }
.mock-btn { font-family:'Rajdhani',monospace; font-size: 10px; font-weight: 700; letter-spacing: 0.1em; text-transform: uppercase; color: var(--label-3); background: rgba(255,255,255,0.04); border: 1px solid rgba(255,255,255,0.12); padding: 6px 12px; border-radius: 6px; cursor: pointer; }
.mock-btn:hover { border-color: rgba(34,211,238,0.4); color: var(--c); }
.mock-btn.on { color: var(--c); border-color: rgba(34,211,238,0.5); background: rgba(34,211,238,0.08); }

/* panel chrome */
.panel { background: var(--panel); border: 1px solid rgba(255,255,255,0.07); border-radius: 16px; padding: 26px 30px 34px; box-shadow: 0 30px 80px -30px rgba(0,0,0,0.8); }
.panel-head { display: flex; align-items: center; gap: 14px; padding-bottom: 16px; margin-bottom: 4px; border-bottom: 1px solid rgba(255,255,255,0.07); }
.panel-icon { width: 38px; height: 38px; border-radius: 10px; display: flex; align-items: center; justify-content: center; background: rgba(34,211,238,0.1); border: 1px solid rgba(34,211,238,0.25); color: var(--c); }
.panel-eyebrow { font-family:'Rajdhani',monospace; font-size: 9px; letter-spacing: 0.22em; text-transform: uppercase; color: var(--label-1); font-weight: 700; }
.panel-title { font-family:'Orbitron',monospace; font-size: 22px; font-weight: 900; letter-spacing: 0.06em; color: #eaf2ff; margin-top: 2px; }
.btn-share { margin-left: auto; display: flex; align-items: center; gap: 7px; font-family:'Rajdhani',monospace; font-size: 10.5px; font-weight: 700; letter-spacing: 0.1em; text-transform: uppercase; color: var(--c); background: rgba(34,211,238,0.1); border: 1px solid rgba(34,211,238,0.35); padding: 8px 14px; border-radius: 8px; cursor: pointer; transition: all .12s; }
.btn-share:hover { background: rgba(34,211,238,0.2); }

/* narrator line */
.st-narrator { font-family:'Rajdhani',monospace; font-size: 13px; font-weight: 600; letter-spacing: 0.02em; color: #9fc7e8; font-style: italic; text-align: center; padding: 14px 0 4px; opacity: 0.92; }
.st-narrator b { color: var(--c); font-style: normal; font-weight: 700; }

/* section reveal */
.section { opacity: 0; transform: translateY(16px); transition: opacity .5s ease, transform .5s cubic-bezier(.22,.61,.36,1); }
.section.in { opacity: 1; transform: none; }
body.reduce .section { opacity: 1; transform: none; transition: none; }
.row-group-title { font-family:'Rajdhani',monospace; font-size: 9px; letter-spacing: 0.2em; font-weight: 700; text-transform: uppercase; color: var(--c); margin: 26px 0 12px; opacity: 0.9; }
.row-group-title b { color: #eaf2ff; }
.empty-note { font-size: 11px; color: var(--label-2); font-style: italic; padding: 10px 2px; }

/* HERO */
.st-hero { display: flex; gap: 18px; align-items: center; background: linear-gradient(160deg, rgba(34,211,238,0.05), rgba(255,255,255,0.012)); border: 1px solid rgba(34,211,238,0.15); border-radius: 12px; padding: 16px 20px; }
.st-ring { width: 92px; height: 92px; flex-shrink: 0; position: relative; }
.st-ring svg { width: 100%; height: 100%; transform: rotate(-90deg); }
.st-ring-c { position: absolute; inset: 0; display: flex; flex-direction: column; align-items: center; justify-content: center; }
.st-ring-pct { font-family:'Orbitron',monospace; font-weight: 900; font-size: 17px; color: #fde047; line-height: 1; }
.st-ring-lbl { font-family:'Rajdhani',monospace; font-size: 7.5px; letter-spacing: 0.12em; color: var(--label-1); font-weight: 700; margin-top: 3px; }
.st-hero-stats { display: grid; grid-template-columns: repeat(4,1fr); gap: 14px; }
.st-hs .k { font-family:'Rajdhani',monospace; font-size: 8px; letter-spacing: 0.12em; color: var(--label-1); font-weight: 700; text-transform: uppercase; }
.st-hs .v { font-family:'Rajdhani',monospace; font-variant-numeric: tabular-nums; font-size: 19px; font-weight: 700; color: #eaf2ff; line-height: 1; margin-top: 4px; }
.st-hs .v.accent { color: var(--c); }
.st-chips { display: flex; gap: 10px; margin-top: 14px; flex-wrap: wrap; }
.st-chip { display: flex; align-items: center; gap: 8px; background: rgba(255,255,255,0.025); border: 1px solid rgba(255,255,255,0.07); border-radius: 999px; padding: 6px 13px; }
.st-chip .ck { font-family:'Rajdhani',monospace; font-size: 8px; letter-spacing: 0.12em; text-transform: uppercase; color: var(--label-1); font-weight: 700; }
.st-chip .cv { font-family:'Rajdhani',monospace; font-variant-numeric: tabular-nums; font-size: 13px; font-weight: 700; color: #eaf2ff; }
.st-chip.streak { border-color: rgba(251,146,60,0.3); background: rgba(251,146,60,0.06); }
.st-chip.streak .cv { color: var(--o); }
.st-chip.ngp { border-color: rgba(192,132,252,0.3); background: rgba(192,132,252,0.06); }
.st-chip.ngp .cv { color: #c084fc; }

/* WOW ROW */
.wow-row { display: grid; grid-template-columns: 1.55fr 1fr; gap: 14px; }
.card { background: rgba(255,255,255,0.018); border: 1px solid rgba(255,255,255,0.06); border-radius: 12px; padding: 15px 17px; position: relative; }
.card-h { display: flex; align-items: baseline; justify-content: space-between; margin-bottom: 12px; gap: 10px; }
.card-t { font-family:'Rajdhani',monospace; font-size: 9px; letter-spacing: 0.16em; text-transform: uppercase; color: var(--label-1); font-weight: 700; }
.card-sub { font-family:'Rajdhani',monospace; font-size: 9px; color: var(--label-2); letter-spacing: 0.04em; }
.card-sub b { color: var(--c); font-variant-numeric: tabular-nums; }
.delta { font-family:'Rajdhani',monospace; font-size: 9.5px; font-weight: 700; letter-spacing: 0.04em; padding: 2px 7px; border-radius: 999px; }
.delta.up { color: var(--g); background: rgba(74,222,128,0.12); }
.delta.down { color: var(--s); background: rgba(244,114,182,0.12); }

.trend-svg { width: 100%; height: 168px; display: block; overflow: visible; }
.trend-empty { height: 168px; display: flex; align-items: center; justify-content: center; text-align: center; font-family:'Rajdhani',monospace; font-size: 12px; color: var(--label-2); font-style: italic; border: 1px dashed rgba(255,255,255,0.1); border-radius: 10px; }
.trend-legend { display: flex; gap: 16px; margin-top: 8px; }
.trend-legend span { display: flex; align-items: center; gap: 6px; font-family:'Rajdhani',monospace; font-size: 9px; letter-spacing: 0.06em; color: var(--label-2); font-weight: 600; }
.trend-legend i { width: 12px; height: 3px; border-radius: 2px; display: inline-block; }
.trend-legend i.win { width: 8px; height: 8px; border-radius: 50%; background: var(--g); }
.trend-legend i.pb { height: 0; border-top: 2px dashed #fde047; }

.radar-svg { width: 100%; height: 188px; display: block; overflow: visible; }
.radar-axis-l { font-family:'Rajdhani',monospace; font-size: 8.5px; font-weight: 700; letter-spacing: 0.08em; fill: #b9c8de; text-transform: uppercase; }
.radar-axis-v { font-family:'Rajdhani',monospace; font-size: 8px; font-weight: 700; fill: var(--c); font-variant-numeric: tabular-nums; }
.radar-arch { text-align: center; margin-top: 6px; }
.radar-arch .lbl { font-family:'Rajdhani',monospace; font-size: 8px; letter-spacing: 0.18em; text-transform: uppercase; color: var(--label-1); font-weight: 700; }
.radar-arch .name { font-family:'Orbitron',monospace; font-size: 14px; font-weight: 700; letter-spacing: 0.06em; color: var(--c); margin-top: 3px; text-shadow: 0 0 14px rgba(34,211,238,0.5); }

/* ACTIVITY heatmap */
.heat-wrap { background: rgba(255,255,255,0.018); border: 1px solid rgba(255,255,255,0.06); border-radius: 12px; padding: 15px 17px; }
.heat-top { display: flex; align-items: center; justify-content: space-between; margin-bottom: 12px; }
.heat-body { display: flex; gap: 22px; align-items: flex-start; flex-wrap: wrap; }
.heat-cal { flex: 1; min-width: 0; }
.heat-months { display: grid; grid-auto-flow: column; grid-auto-columns: 15px; gap: 3px; margin: 0 0 4px 22px; height: 11px; }
.heat-mon { font-family:'Rajdhani',monospace; font-size: 8px; letter-spacing: 0.1em; color: var(--label-1); text-transform: uppercase; white-space: nowrap; }
.heat-rowwrap { display: flex; gap: 5px; }
.heat-wd { display: grid; grid-template-rows: repeat(7, 15px); gap: 3px; }
.heat-wd span { font-family:'Rajdhani',monospace; font-size: 8px; color: var(--label-1); line-height: 15px; }
.heat-grid { display: grid; grid-auto-flow: column; grid-template-rows: repeat(7, 15px); grid-auto-columns: 15px; gap: 3px; }
.heat-cell { width: 15px; height: 15px; border-radius: 3px; background: rgba(255,255,255,0.04); transition: transform .1s; }
.heat-cell.pad { background: transparent; }
.heat-cell:not(.pad):hover { outline: 1px solid var(--c); transform: scale(1.3); }
.heat-l1 { background: rgba(34,211,238,0.24); }
.heat-l2 { background: rgba(34,211,238,0.45); }
.heat-l3 { background: rgba(34,211,238,0.68); }
.heat-l4 { background: rgba(34,211,238,0.96); box-shadow: 0 0 6px -1px rgba(34,211,238,0.7); }
.heat-mini { display: flex; flex-direction: column; gap: 9px; min-width: 130px; }
.heat-mini .m { background: rgba(255,255,255,0.02); border: 1px solid rgba(255,255,255,0.06); border-radius: 8px; padding: 8px 11px; }
.heat-mini .mk { font-family:'Rajdhani',monospace; font-size: 7.5px; letter-spacing: 0.12em; text-transform: uppercase; color: var(--label-1); font-weight: 700; }
.heat-mini .mv { font-family:'Rajdhani',monospace; font-variant-numeric: tabular-nums; font-size: 14px; font-weight: 700; color: #eaf2ff; margin-top: 2px; }
.heat-legend { display: flex; align-items: center; gap: 6px; font-family:'Rajdhani',monospace; font-size: 8.5px; color: var(--label-2); letter-spacing: 0.06em; margin-top: 12px; justify-content: flex-end; }
.heat-legend .sw { width: 11px; height: 11px; border-radius: 3px; }
.streak-badge { display: flex; align-items: center; gap: 8px; font-family:'Rajdhani',monospace; font-weight: 700; }
.streak-badge .fire { font-size: 16px; }
.streak-badge .num { font-size: 18px; color: var(--o); font-variant-numeric: tabular-nums; }
.streak-badge .lbl { font-size: 9px; letter-spacing: 0.12em; text-transform: uppercase; color: var(--label-1); }

/* BY MODE */
.mode-tbl { display: flex; flex-direction: column; }
.mode-row { display: grid; grid-template-columns: 16px 1fr 64px 120px 110px; align-items: center; gap: 12px; padding: 9px 6px; border-bottom: 1px solid rgba(255,255,255,0.04); }
.mode-row.head { font-family:'Rajdhani',monospace; font-size: 8px; letter-spacing: 0.14em; text-transform: uppercase; color: var(--label-1); font-weight: 700; border-bottom: 1px solid rgba(255,255,255,0.09); }
.mode-dot { width: 9px; height: 9px; border-radius: 50%; box-shadow: 0 0 7px -1px currentColor; }
.mode-name { font-family:'Rajdhani',monospace; font-size: 12px; font-weight: 700; letter-spacing: 0.04em; color: #dbe6f7; }
.mode-plays { font-family:'Rajdhani',monospace; font-variant-numeric: tabular-nums; font-size: 12px; color: #b9c8de; text-align: right; }
.mode-win { display: flex; align-items: center; gap: 8px; }
.mode-win-track { flex: 1; height: 6px; border-radius: 3px; background: rgba(255,255,255,0.06); overflow: hidden; }
.mode-win-fill { height: 100%; border-radius: 3px; background: var(--g); box-shadow: 0 0 6px -1px var(--g); }
.mode-win-v { font-family:'Rajdhani',monospace; font-variant-numeric: tabular-nums; font-size: 10px; font-weight: 700; color: #9fb4cf; width: 30px; text-align: right; }
.mode-best { font-family:'Rajdhani',monospace; font-variant-numeric: tabular-nums; font-size: 12px; font-weight: 700; color: #eaf2ff; text-align: right; }
.mode-head-r { text-align: right; }

/* hbar */
.hbar { display: grid; grid-template-columns: 128px 1fr 64px; align-items: center; gap: 11px; padding: 4px 0; }
.hbar-k { font-family:'Rajdhani',monospace; font-size: 10.5px; font-weight: 600; color: #b9c8de; letter-spacing: 0.03em; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.hbar-track { height: 8px; border-radius: 4px; background: rgba(255,255,255,0.06); overflow: hidden; }
.hbar-fill { height: 100%; border-radius: 4px; box-shadow: 0 0 8px -1px currentColor; }
.hbar-v { font-family:'Rajdhani',monospace; font-variant-numeric: tabular-nums; font-size: 11px; font-weight: 700; color: #dbe6f7; text-align: right; }
.two-col { display: grid; grid-template-columns: 1fr 1fr; gap: 4px 30px; }

/* COMBAT */
.stat-cells { display: grid; grid-template-columns: repeat(4, 1fr); gap: 1px; background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.05); border-radius: 10px; overflow: hidden; }
.stat-cell { background: rgba(8,12,24,0.6); padding: 14px 12px; text-align: center; }
.stat-cell-k { font-size: 8px; letter-spacing: 0.13em; color: var(--label-1); font-weight: 700; text-transform: uppercase; margin-bottom: 6px; }
.stat-cell-v { font-family:'Rajdhani',monospace; font-variant-numeric: tabular-nums; font-size: 21px; font-weight: 700; color: #eaf2ff; line-height: 1; }
.stat-cell-v.accent { color: var(--c); } .stat-cell-v.gold { color: #fde047; } .stat-cell-v.green { color: var(--g); }

/* RECORDS */
.rec-grid { display: grid; grid-template-columns: repeat(3,1fr); gap: 10px; }
.rec { background: rgba(255,255,255,0.02); border: 1px solid rgba(255,255,255,0.06); border-radius: 9px; padding: 11px 13px; }
.rec .k { font-family:'Rajdhani',monospace; font-size: 8px; letter-spacing: 0.1em; color: var(--label-1); font-weight: 700; text-transform: uppercase; margin-bottom: 5px; }
.rec .v { font-family:'Rajdhani',monospace; font-variant-numeric: tabular-nums; font-size: 15px; font-weight: 700; color: #eaf2ff; }
.rec .v small { font-size: 10px; color: #8aa0bd; font-weight: 600; }

/* COLLECTION */
.coll-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px 26px; }
.coll-top { display: flex; align-items: baseline; justify-content: space-between; margin-bottom: 6px; }
.coll-k { font-family:'Rajdhani',monospace; font-size: 10.5px; font-weight: 700; letter-spacing: 0.06em; color: #cdd9ec; text-transform: uppercase; }
.coll-v { font-family:'Rajdhani',monospace; font-variant-numeric: tabular-nums; font-size: 11px; font-weight: 700; color: var(--label-3); }
.coll-v b { color: var(--c); }
.coll-track { height: 7px; border-radius: 4px; background: rgba(255,255,255,0.06); overflow: hidden; }
.coll-fill { height: 100%; border-radius: 4px; background: linear-gradient(90deg, var(--c), var(--p)); box-shadow: 0 0 7px -1px var(--c); }
.coll-row.done .coll-fill { background: linear-gradient(90deg, #fde047, #fbbf24); box-shadow: 0 0 7px -1px #fde047; }
.coll-row.done .coll-v b { color: #fde047; }

/* tooltip + share overlay */
.tip { position: fixed; z-index: 50; pointer-events: none; background: rgba(8,12,24,0.97); border: 1px solid rgba(34,211,238,0.3); border-radius: 7px; padding: 7px 10px; font-family:'Rajdhani',monospace; font-size: 10px; color: #dbe6f7; letter-spacing: 0.03em; opacity: 0; transition: opacity .1s; box-shadow: 0 8px 24px -8px rgba(0,0,0,0.9); white-space: nowrap; }
.tip b { color: var(--c); font-variant-numeric: tabular-nums; }
.tip .o-win { color: var(--g); } .tip .o-loss { color: var(--s); }
.share-modal { position: fixed; inset: 0; z-index: 100; display: none; align-items: center; justify-content: center; background: rgba(2,4,10,0.8); backdrop-filter: blur(4px); }
.share-modal.open { display: flex; }
.share-box { text-align: center; }
.share-box canvas { border-radius: 14px; box-shadow: 0 30px 80px -20px rgba(0,0,0,0.9); max-width: 92vw; }
.share-actions { margin-top: 14px; display: flex; gap: 10px; justify-content: center; }

body.reduce * { animation: none !important; }
@media (max-width: 820px) {
  .wow-row { grid-template-columns: 1fr; }
  .st-hero { flex-direction: column; align-items: stretch; }
  .st-hero-stats { grid-template-columns: repeat(2,1fr); }
  .stat-cells { grid-template-columns: repeat(2,1fr); }
  .coll-grid, .two-col { grid-template-columns: 1fr; }
}
</style>
</head>
<body>
<div class="wrap">
  <div class="mock-bar">
    <span class="mock-tag">Design mockup v2</span>
    <span class="mock-note">STATS dossier — fake data, not wired in-game yet.</span>
    <span class="mock-spacer"></span>
    <button class="mock-btn on" id="viewVet">Veteran</button>
    <button class="mock-btn" id="viewNew">New player</button>
    <button class="mock-btn" id="toggleMotion">Reduced-motion</button>
    <button class="mock-btn" id="replay">Replay</button>
  </div>

  <div class="panel">
    <div class="panel-head">
      <div class="panel-icon">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 3v18h18"/><path d="M7 14l4-4 3 3 5-6"/></svg>
      </div>
      <div>
        <div class="panel-eyebrow">Lifetime dossier</div>
        <div class="panel-title">STATS</div>
      </div>
      <button class="btn-share" id="shareBtn">
        <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><circle cx="18" cy="5" r="3"/><circle cx="6" cy="12" r="3"/><circle cx="18" cy="19" r="3"/><path d="M8.6 13.5l6.8 4M15.4 6.5l-6.8 4"/></svg>
        Share card
      </button>
    </div>
    <div id="dossier"></div>
  </div>
</div>
<div class="tip" id="tip"></div>
<div class="share-modal" id="shareModal">
  <div class="share-box">
    <canvas id="shareCanvas" width="800" height="420"></canvas>
    <div class="share-actions">
      <button class="mock-btn" id="dlCard">Download PNG</button>
      <button class="mock-btn" id="closeShare">Close</button>
    </div>
  </div>
</div>

<script>
const reduce = () => document.body.classList.contains('reduce');
function el(t,c,h){ const e=document.createElement(t); if(c)e.className=c; if(h!=null)e.innerHTML=h; return e; }
const fmt = n => (typeof n==='number'?n:0).toLocaleString('en-US');
const mmss = s => `${Math.floor(s/60)}:${String(Math.floor(s%60)).padStart(2,'0')}`;
function mulberry32(a){return function(){a|=0;a=a+0x6D2B79F5|0;let t=Math.imul(a^a>>>15,1|a);t=t+Math.imul(t^t>>>7,61|t)^t;return((t^t>>>14)>>>0)/4294967296;};}

// ── data sets ────────────────────────────────────────────────────────────────
function makeRuns(n, base, step, winP, seed){ const r=mulberry32(seed), out=[]; for(let i=0;i<n;i++){ const sc=Math.max(6000, Math.round(base+i*step+(r()-0.4)*step*14)); out.push({score:sc, won:r()<winP, mode:['STD','CAS','ARENA','DAILY','BR'][Math.floor(r()*5)], wave:5+Math.floor(r()*19)}); } return out; }
function makeHeat(weeks, activeRecent, seed){ const r=mulberry32(seed), out=[], today=new Date(), DAYS=weeks*7; for(let d=DAYS-1; d>=0; d--){ let c=0; const x=r(); if(d<activeRecent) c=1+Math.floor(r()*4); else if(x>0.87) c=1+Math.floor(r()*4); else if(x>0.64) c=Math.floor(r()*2); const date=new Date(today); date.setDate(today.getDate()-d); out.push({c,date}); } return out; }

const VET = {
  achGot:28, achTotal:52, highScore:327540, bestCombo:52, totalRuns:148, lifeWins:56, playtimeSec:51720, streak:6, ngPlus:3,
  records:[['Deepest Wave','24'],['Highest Heat','H7','· Inferno'],['Longest Run','11:48'],['Fastest Arena','4:32'],['Biggest Combo','×52'],['Bosses · One Run','5']],

const tip = document.getElementById('tip');
const showTip=(h,x,y)=>{ tip.innerHTML=h; tip.style.opacity='1'; tip.style.left=(x+14)+'px'; tip.style.top=(y+14)+'px'; };
const hideTip=()=> tip.style.opacity='0';
function countUp(node,target,prefix='',suffix='',dur=850){ if(reduce()){ node.textContent=prefix+fmt(target)+suffix; return;} const t0=performance.now(),ease=x=>1-Math.pow(1-x,3); (function s(t){const k=Math.min(1,(t-t0)/dur); node.textContent=prefix+fmt(Math.round(target*ease(k)))+suffix; if(k<1)requestAnimationFrame(s);})(t0); }
function growBar(fill,pct){ if(reduce()){fill.style.width=pct+'%';return;} fill.style.width='0%'; fill.style.transition='width .65s cubic-bezier(.22,.61,.36,1)'; requestAnimationFrame(()=>requestAnimationFrame(()=>fill.style.width=pct+'%')); }

function bHero(){

  const right=el('div'); right.style.flex='1';
  const grid=el('div','st-hero-stats');
  const mk=(k,cls)=>el('div','st-hs',`<div class="k">${k}</div><div class="v ${cls||''}">—</div>`);
  const hs=[mk('High Score','accent'),mk('Best Combo'),mk('Runs Survived'),mk('Win Rate')];
  hs.forEach(h=>grid.appendChild(h));
  const chips=el('div','st-chips');
  const pt=`${Math.floor(S.playtimeSec/3600)}h ${Math.round(S.playtimeSec%3600/60)}m`;
  chips.innerHTML=`<div class="st-chip"><span>⏱</span><div><div class="ck">Time in the City</div><div class="cv">${pt}</div></div></div>`+
    `<div class="st-chip streak"><span>🔥</span><div><div class="ck">Day streak</div><div class="cv">${S.streak} day${S.streak===1?'':'s'}</div></div></div>`+
    (S.ngPlus>0?`<div class="st-chip ngp"><span>↻</span><div><div class="ck">NG+ loop</div><div class="cv">${S.ngPlus}</div></div></div>`:'');
  right.appendChild(grid); right.appendChild(chips);
  wrap.appendChild(ring); wrap.appendChild(right);
  const wr=Math.round((S.lifeWins/Math.max(1,S.totalRuns))*100);
  return {node:wrap, animate(){
    const arc=ring.querySelector('.arc'), pct=ring.querySelector('.st-ring-pct');

    else { arc.style.transition='stroke-dashoffset 1.1s cubic-bezier(.22,.61,.36,1)'; requestAnimationFrame(()=>requestAnimationFrame(()=>arc.style.strokeDashoffset=off)); countUp(pct,Math.round(ratio*100),'','%'); }
    countUp(hs[0].querySelector('.v'),S.highScore);

}

function bPerformance(){
  const row=el('div','wow-row');
  // trend
  const tc=el('div','card');
  const scores=S.runs.map(r=>r.score);
  let deltaHTML='';
  if(S.runs.length>=10){ const last=scores.slice(-10).reduce((a,b)=>a+b,0)/10, first=scores.slice(0,10).reduce((a,b)=>a+b,0)/10; const d=Math.round((last-first)/first*100); deltaHTML=`<span class="delta ${d>=0?'up':'down'}">${d>=0?'↑':'↓'} ${Math.abs(d)}% vs first runs</span>`; }
  tc.innerHTML=`<div class="card-h"><span class="card-t">Score Trend</span><span style="display:flex;gap:8px;align-items:center">${deltaHTML}<span class="card-sub">last <b>${S.runs.length}</b> · best <b>${fmt(S.highScore)}</b></span></span></div>`;
  let trendAnim=()=>{};
  if(S.runs.length<5){
    tc.appendChild(el('div','trend-empty','Play a few runs — your score trend will chart here.'));
  } else {
    const W=680,H=168,pad=8,padB=14;
    const min=Math.min(...scores)*0.9, max=Math.max(Math.max(...scores),S.highScore)*1.04;
    const X=i=>pad+i/(S.runs.length-1)*(W-2*pad), Y=v=>H-padB-(v-min)/(max-min)*(H-pad-padB);
    let line='',area=`M ${X(0)} ${H-padB}`;
    S.runs.forEach((r,i)=>{const x=X(i).toFixed(1),y=Y(r.score).toFixed(1); line+=(i?' L ':'M ')+x+' '+y; area+=' L '+x+' '+y;});
    area+=` L ${X(S.runs.length-1)} ${H-padB} Z`;
    const pbY=Y(S.highScore).toFixed(1);
    const dots=S.runs.map((r,i)=>r.won?`<circle cx="${X(i).toFixed(1)}" cy="${Y(r.score).toFixed(1)}" r="3" fill="#4ade80" stroke="#03050d" stroke-width="1"/>`:'').join('');
    const holder=el('div'); holder.innerHTML=`<svg class="trend-svg" viewBox="0 0 ${W} ${H}" preserveAspectRatio="none"><defs><linearGradient id="tg" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="rgba(34,211,238,0.34)"/><stop offset="100%" stop-color="rgba(34,211,238,0)"/></linearGradient></defs><line x1="${pad}" y1="${pbY}" x2="${W-pad}" y2="${pbY}" stroke="#fde047" stroke-width="1" stroke-dasharray="3 4" opacity="0.55"/><path d="${area}" fill="url(#tg)" class="t-area" style="opacity:0"/><path d="${line}" fill="none" stroke="#22d3ee" stroke-width="2" stroke-linejoin="round" stroke-linecap="round" class="t-line" style="filter:drop-shadow(0 0 4px rgba(34,211,238,0.5))"/><g class="t-dots" style="opacity:0">${dots}</g><line class="t-scrub" x1="0" y1="${pad}" x2="0" y2="${H-padB}" stroke="rgba(34,211,238,0.5)" stroke-width="1" style="opacity:0"/><circle class="t-pt" r="4" fill="#22d3ee" stroke="#03050d" stroke-width="1.5" style="opacity:0"/><rect class="t-hit" x="0" y="0" width="${W}" height="${H}" fill="transparent"/></svg>`;
    const svg=holder.firstElementChild; tc.appendChild(svg);
    tc.insertAdjacentHTML('beforeend',`<div class="trend-legend"><span><i class="win"></i>Win</span><span><i class="pb"></i>All-time best</span><span><i style="background:#22d3ee"></i>Run score</span></div>`);
    const lineEl=svg.querySelector('.t-line'),area2=svg.querySelector('.t-area'),dotsEl=svg.querySelector('.t-dots');
    const scrub=svg.querySelector('.t-scrub'),pt2=svg.querySelector('.t-pt'),hit=svg.querySelector('.t-hit');
    hit.addEventListener('mousemove',e=>{ const rc=svg.getBoundingClientRect(); const i=Math.max(0,Math.min(S.runs.length-1,Math.round((e.clientX-rc.left)/rc.width*(S.runs.length-1)))); const r=S.runs[i]; const x=X(i),y=Y(r.score); scrub.setAttribute('x1',x); scrub.setAttribute('x2',x); scrub.style.opacity='1'; pt2.setAttribute('cx',x); pt2.setAttribute('cy',y); pt2.style.opacity='1'; showTip(`Run ${i+1}/${S.runs.length} · <b>${fmt(r.score)}</b><br>${r.mode} · wave ${r.wave} · <span class="${r.won?'o-win':'o-loss'}">${r.won?'WON':'fell'}</span>`,e.clientX,e.clientY); });
    hit.addEventListener('mouseleave',()=>{ hideTip(); scrub.style.opacity='0'; pt2.style.opacity='0'; });
    trendAnim=()=>{ if(reduce()){ area2.style.opacity='1'; dotsEl.style.opacity='1'; return; } const len=lineEl.getTotalLength(); lineEl.style.strokeDasharray=len; lineEl.style.strokeDashoffset=len; requestAnimationFrame(()=>{ lineEl.style.transition='stroke-dashoffset 1.2s cubic-bezier(.4,0,.2,1)'; lineEl.style.strokeDashoffset='0'; }); area2.style.transition='opacity .9s ease .3s'; area2.style.opacity='1'; dotsEl.style.transition='opacity .5s ease 1s'; dotsEl.style.opacity='1'; };
  }
  // radar
  const rc=el('div','card');
  rc.innerHTML=`<div class="card-h"><span class="card-t">Playstyle</span><span class="card-sub">your lean</span></div>`;
  const W=300,H=188,cx=150,cy=92,R=66;
  const axes=S.radar.map(a=>({name:a[0],val:a[1],rating:Math.min(1,a[1]/a[2])}));
  const maxR=Math.max(...axes.map(a=>a.rating),0.0001);
  axes.forEach(a=>a.norm=Math.max(0.04,a.rating/maxR));
  const ang=i=>(-90+i*(360/axes.length))*Math.PI/180;
  const P=(i,r)=>[(cx+Math.cos(ang(i))*R*r).toFixed(1),(cy+Math.sin(ang(i))*R*r).toFixed(1)];
  let grid='',spk='',lab='';
  [0.25,0.5,0.75,1].forEach(rr=>grid+=`<polygon points="${axes.map((_,i)=>P(i,rr).join(',')).join(' ')}" fill="none" stroke="rgba(255,255,255,0.07)"/>`);
  axes.forEach((a,i)=>{ const[ex,ey]=P(i,1); spk+=`<line x1="${cx}" y1="${cy}" x2="${ex}" y2="${ey}" stroke="rgba(255,255,255,0.06)"/>`; const[lx,ly]=P(i,1.34); const an=Math.abs(lx-cx)<6?'middle':(lx>cx?'start':'end'); lab+=`<text x="${lx}" y="${+ly-1}" text-anchor="${an}" class="radar-axis-l">${a.name}</text><text x="${lx}" y="${+ly+9}" text-anchor="${an}" class="radar-axis-v">${a.val}</text>`; });
  const shape=axes.map((a,i)=>P(i,a.norm).join(',')).join(' ');
  const verts=axes.map((a,i)=>{const[x,y]=P(i,a.norm);return `<circle cx="${x}" cy="${y}" r="2.6" fill="#22d3ee"/>`;}).join('');
  const holder2=el('div'); holder2.innerHTML=`<svg class="radar-svg" viewBox="0 0 ${W} ${H}"><defs><radialGradient id="rg" cx="50%" cy="50%" r="50%"><stop offset="0%" stop-color="rgba(34,211,238,0.45)"/><stop offset="100%" stop-color="rgba(129,140,248,0.18)"/></radialGradient></defs>${grid}${spk}<g class="r-shape" style="transform-origin:${cx}px ${cy}px;transform:scale(0.02)"><polygon points="${shape}" fill="url(#rg)" stroke="#22d3ee" stroke-width="1.6" style="filter:drop-shadow(0 0 5px rgba(34,211,238,0.5))"/>${verts}</g>${lab}</svg>`;
  rc.appendChild(holder2.firstElementChild);
  // archetype
  const dom=axes.slice().sort((a,b)=>b.rating-a.rating)[0];
  const archName = S.totalRuns<5 ? 'FINDING YOUR LANCE' : (ARCH[dom.name]||'—');
  rc.appendChild(el('div','radar-arch',`<div class="lbl">Playstyle</div><div class="name">${archName}</div>`));
  const rShape=rc.querySelector('.r-shape');
  const radarAnim=()=>{ if(reduce()){rShape.style.transform='scale(1)';return;} rShape.style.transition='transform .8s cubic-bezier(.34,1.4,.5,1)'; requestAnimationFrame(()=>requestAnimationFrame(()=>rShape.style.transform='scale(1)')); };
  row.appendChild(tc); row.appendChild(rc);
  return {node:row, animate(){ trendAnim(); radarAnim(); }};
}

function bActivity(){
  const wrap=el('div','heat-wrap');
  const top=el('div','heat-top');
  top.innerHTML=`<span class="card-t">Activity · last 26 weeks</span><span class="streak-badge"><span class="fire">🔥</span><span class="num">${S.streak}</span><span class="lbl">day streak</span></span>`;
  wrap.appendChild(top);
  const body=el('div','heat-body');
  const cal=el('div','heat-cal');
  // pad start so rows align to weekday (Sun row 0)
  const first=S.heat[0].date.getDay();
  const cells=[]; for(let i=0;i<first;i++)cells.push(null); S.heat.forEach(d=>cells.push(d));
  // month labels per column (week)
  const months=el('div','heat-months'); let lastMon=-1; const cols=Math.ceil(cells.length/7);
  for(let col=0;col<cols;col++){ const cell=cells[col*7]||cells.find((c,idx)=>idx>=col*7&&c); const m=cell?cell.date.getMonth():-1; const span=el('span','heat-mon'); if(m!==-1&&m!==lastMon){ span.textContent=MON[m]; lastMon=m; } months.appendChild(span); }
  cal.appendChild(months);
  const rowwrap=el('div','heat-rowwrap');
  const wd=el('div','heat-wd'); WD.forEach(d=>wd.appendChild(el('span','',d))); rowwrap.appendChild(wd);
  const grid=el('div','heat-grid');
  const cellEls=[];
  cells.forEach(day=>{ if(!day){ grid.appendChild(el('div','heat-cell pad')); return; } const L=day.c<=0?0:day.c===1?1:day.c===2?2:day.c<=3?3:4; const c=el('div','heat-cell'+(L?` heat-l${L}`:'')); c.dataset.l=L; const ds=day.date.toLocaleDateString('en-US',{month:'short',day:'numeric'}); c.addEventListener('mousemove',e=>showTip(`${ds} · <b>${day.c}</b> run${day.c===1?'':'s'}`,e.clientX,e.clientY)); c.addEventListener('mouseleave',hideTip); grid.appendChild(c); cellEls.push(c); });
  rowwrap.appendChild(grid); cal.appendChild(rowwrap);

  mini.innerHTML=`<div class="m"><div class="mk">This month</div><div class="mv">${thisMonth} runs</div></div><div class="m"><div class="mk">Active days</div><div class="mv">${S.heat.filter(d=>d.c>0).length}</div></div><div class="m"><div class="mk">Busiest day</div><div class="mv">${best} runs</div></div>`;
  body.appendChild(mini);

  return {node:wrap, animate(){ if(reduce())return; cellEls.forEach((c,i)=>{ c.style.opacity='0'; c.style.transition='opacity .3s'; setTimeout(()=>c.style.opacity='1', i*4); }); }};

function bBars(rows,suffix){
  const wrap=el('div'); const max=Math.max(...rows.map(r=>r[1]),1); const fills=[];
  rows.forEach(([k,n,color])=>{ const row=el('div','hbar'); const pct=Math.max(5,n/max*100); row.innerHTML=`<div class="hbar-k">${k}</div><div class="hbar-track"><div class="hbar-fill" style="width:0%;background:${color};color:${color}"></div></div><div class="hbar-v">${suffix==='x'?fmt(n)+' ✕':fmt(n)}</div>`; wrap.appendChild(row); fills.push([row.querySelector('.hbar-fill'),pct]); });
  return {node:wrap, animate(){ fills.forEach(([f,p])=>growBar(f,p)); }};
}

  return {node:g, animate(){ fills.forEach(([f,p])=>growBar(f,p)); }};

// ── assemble with scroll-reveal ───────────────────────────────────────────────
let io=null;
function section(title, built){
  const sec=el('div','section');
  if(title) sec.appendChild(el('div','row-group-title',title));
  sec.appendChild(built.node);
  sec._animate=built.animate; sec._done=false;
  return sec;
}
function render(){
  if(io)io.disconnect();
  const d=document.getElementById('dossier'); d.innerHTML='';
  const heat=bActivity();
  const secs=[
    section(null, bHero()),
    section(null, {node:el('div','st-narrator', S.totalRuns<5 ? `The City is just beginning to remember you.` : `You've held the light for <b>${Math.floor(S.playtimeSec/3600)} hours</b> across <b>${S.totalRuns}</b> descents.`), animate(){}}),
    section('Performance', bPerformance()),
    section('Activity', heat),
    section('By mode', bModes()),
  ];
  if(S.nemesis.length) secs.push(section('Nemesis · <b>who ends your runs</b>', bBars(S.nemesis,'x')));
  else secs.push(section('Nemesis · <b>who ends your runs</b>', {node:el('div','empty-note','Nothing has ended you yet. Hold the light.'), animate(){}}));
  const half=Math.ceil(S.kills.length/2);
  const kc={node:el('div','two-col'),animate(){}};
  const kl=bBars(S.kills.slice(0,half)), kr=bBars(S.kills.slice(half));
  kc.node.appendChild(kl.node); kc.node.appendChild(kr.node); kc.animate=()=>{kl.animate();kr.animate();};
  secs.push(section('Kills by foe', kc));
  secs.push(section('Combat · lifetime', bCombat()));
  secs.push(section('Records', bRecords()));
  secs.push(section('Collection', bCollection()));
  secs.forEach(s=>d.appendChild(s));

  const revealNow=s=>{ if(s._done)return; s._done=true; s.classList.add('in'); s._animate(); };
  // reduced-motion OR no IntersectionObserver → reveal everything up front (never leave content hidden)
  if(reduce() || !('IntersectionObserver' in window)){ secs.forEach(revealNow); return; }
  io=new IntersectionObserver((ents)=>{ ents.forEach(e=>{ if(e.isIntersecting) { revealNow(e.target); io.unobserve(e.target); } }); },{threshold:0.12});
  secs.forEach(s=>io.observe(s));
  // initial pass: reveal anything already in (or above) the fold so above-the-fold content
  // animates on load — and if the viewport is unknown/zero, reveal all as a safety net.
  const vh=window.innerHeight||0;
  secs.forEach(s=>{ if(vh<=0 || s.getBoundingClientRect().top < vh*0.92) revealNow(s); });
}

// ── share card (canvas export — proof of concept) ─────────────────────────────
function drawShareCard(){
  const cv=document.getElementById('shareCanvas'), x=cv.getContext('2d'), W=cv.width, H=cv.height;
  const g=x.createLinearGradient(0,0,W,H); g.addColorStop(0,'#060a16'); g.addColorStop(1,'#0a1224'); x.fillStyle=g; x.fillRect(0,0,W,H);
  x.strokeStyle='rgba(34,211,238,0.4)'; x.lineWidth=2; x.strokeRect(12,12,W-24,H-24);
  x.fillStyle='#6d89ab'; x.font='700 15px Rajdhani, sans-serif'; x.textBaseline='alphabetic';
  x.fillText('THE LAST LANCE · LIFETIME DOSSIER', 40, 56);
  const dom=S.radar.map(a=>({n:a[0],r:a[1]/a[2]})).sort((a,b)=>b.r-a.r)[0];
  x.fillStyle='#22d3ee'; x.font='900 34px Orbitron, sans-serif';
  x.fillText(S.totalRuns<5?'FINDING YOUR LANCE':(ARCH[dom.n]||''), 40, 100);
  const stats=[['HIGH SCORE',fmt(S.highScore)],['RUNS',String(S.totalRuns)],['WIN RATE',Math.round(S.lifeWins/Math.max(1,S.totalRuns)*100)+'%'],['DEEPEST WAVE',S.records[0][1]],['BEST COMBO','×'+S.bestCombo],['ACHIEVEMENTS',S.achGot+'/'+S.achTotal]];
  stats.forEach((s,i)=>{ const cx=40+(i%3)*255, cy=170+Math.floor(i/3)*95; x.fillStyle='#6d89ab'; x.font='700 12px Rajdhani, sans-serif'; x.fillText(s[0],cx,cy); x.fillStyle='#eaf2ff'; x.font='700 30px Rajdhani, sans-serif'; x.fillText(s[1],cx,cy+34); });
  x.fillStyle='#7a93b2'; x.font='italic 13px Rajdhani, sans-serif'; x.fillText('lancefall.pages.dev', 40, H-30);
}
document.getElementById('shareBtn').addEventListener('click',()=>{ drawShareCard(); document.getElementById('shareModal').classList.add('open'); });
document.getElementById('closeShare').addEventListener('click',()=>document.getElementById('shareModal').classList.remove('open'));
document.getElementById('dlCard').addEventListener('click',()=>{ const a=document.createElement('a'); a.download='lancefall-stats.png'; a.href=document.getElementById('shareCanvas').toDataURL('image/png'); a.click(); });

// ── toolbar ───────────────────────────────────────────────────────────────────
function setView(v){ S=v===NEW?NEW:VET; document.getElementById('viewVet').classList.toggle('on',S===VET); document.getElementById('viewNew').classList.toggle('on',S===NEW); window.scrollTo(0,0); render(); }
document.getElementById('viewVet').addEventListener('click',()=>setView(VET));
document.getElementById('viewNew').addEventListener('click',()=>setView(NEW));
document.getElementById('toggleMotion').addEventListener('click',e=>{ document.body.classList.toggle('reduce'); e.target.classList.toggle('on',reduce()); render(); });
document.getElementById('replay').addEventListener('click',()=>{ window.scrollTo(0,0); render(); });

render();
</script>
