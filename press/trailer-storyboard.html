<!doctype html>
<!-- ~90s trailer storyboard contact-sheet (rendered to trailer-storyboard.png). A one-glance
     recording guide: the 10 beats from docs/SUBMISSION.md §2, with the frames already captured
     vs the ones to grab live. Cells with a [LIVE] tag still need a real capture pass. -->
<html lang="en">
<head>
<meta charset="utf-8" />
<style>
  @import url('https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@600;700&family=JetBrains+Mono:wght@500;700&display=swap');
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { width: 1280px; background: #07090f; font-family: 'Space Grotesk', sans-serif; color: #eaf2ff; padding: 34px 38px 40px; }
  .head { display: flex; align-items: baseline; gap: 16px; margin-bottom: 6px; }
  .head h1 { font-size: 30px; font-weight: 700; letter-spacing: -0.01em; }
  .head .key { font-family: 'JetBrains Mono', monospace; font-size: 12px; letter-spacing: 0.26em; color: #fde047; }
  .sub { font-family: 'JetBrains Mono', monospace; font-size: 12.5px; color: #8fb3d9; letter-spacing: 0.06em; margin-bottom: 22px; }
  .grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 16px; }
  .beat { position: relative; border: 1px solid rgba(120,160,220,0.18); border-radius: 12px; overflow: hidden; height: 218px; background: #0b0e17; }
  .beat .thumb { position: absolute; inset: 0; background-size: cover; background-position: center; }
  .beat.live .thumb { background:
      radial-gradient(120% 90% at 30% 20%, rgba(34,211,238,0.10), transparent 60%),
      repeating-linear-gradient(45deg, rgba(255,255,255,0.018) 0 12px, transparent 12px 24px), #0b0e17; }
  .beat .scrim { position: absolute; inset: 0; background: linear-gradient(180deg, rgba(7,9,15,0.55) 0%, rgba(7,9,15,0.08) 38%, rgba(7,9,15,0.82) 100%); }
  .beat .top { position: absolute; top: 11px; left: 13px; right: 13px; display: flex; justify-content: space-between; align-items: center; }
  .beat .num { font-family: 'JetBrains Mono', monospace; font-weight: 700; font-size: 13px; color: #22d3ee; background: rgba(7,9,15,0.6); padding: 2px 9px; border-radius: 999px; letter-spacing: 0.1em; }
  .beat .time { font-family: 'JetBrains Mono', monospace; font-size: 12px; color: #cdd9ec; background: rgba(7,9,15,0.6); padding: 2px 8px; border-radius: 999px; }
  .beat .live-tag { font-family: 'JetBrains Mono', monospace; font-size: 10px; letter-spacing: 0.2em; color: #fda4af; border: 1px solid rgba(253,164,175,0.5); padding: 2px 7px; border-radius: 999px; }
  .beat .have-tag { font-family: 'JetBrains Mono', monospace; font-size: 10px; letter-spacing: 0.2em; color: #6ee7b7; border: 1px solid rgba(110,231,183,0.5); padding: 2px 7px; border-radius: 999px; }
  .beat .body { position: absolute; bottom: 12px; left: 14px; right: 14px; }
  .beat .what { font-weight: 600; font-size: 15px; color: #fff; line-height: 1.25; }
  .beat .cap { font-family: 'JetBrains Mono', monospace; font-size: 11.5px; color: #9fd0ff; margin-top: 5px; font-style: italic; }
  .foot { font-family: 'JetBrains Mono', monospace; font-size: 11.5px; color: #7e93b5; margin-top: 20px; line-height: 1.5; }
</style>
</head>
<body>
  <div class="head"><h1>LANCEFALL — ~90s trailer storyboard</h1><span class="key">◆ THE LAST KEY</span></div>
  <div class="sub">Music: the in-game COHERENCE swell carries it; the choir blooms on FIRST LIGHT (beat 8). Capture 1080p/60 from lancefall.pages.dev.</div>
  <div class="grid" id="grid"></div>
  <div class="foot" id="foot"></div>
  <script>
    const BEATS = [
      { n: 1, t: '0–6s', img: 'title-cockpit.png', what: 'Grey, desaturated city; lone-drone hum; the title resolves from noise', cap: 'Lancefall fell. Its light was scrambled into grey.' },
      { n: 2, t: '6–14s', img: 'gameplay-combat.png', what: 'One clean charge-dash through a group — spear trail, i-frame through a bullet line', cap: "You don't shoot. You dash." },
      { n: 3, t: '14–24s', live: true, what: 'Combo climbs; kills chain; RAMPAGE → FRENZY callouts; world tints neon', cap: 'Chain the kills. Light the city.' },
      { n: 4, t: '24–34s', live: true, what: 'COHERENCE high: full neon wash, skyline glowing, choir in, dash-on-beat ring', cap: 'COHERENCE — sight, sound, and meaning, bound.' },
      { n: 5, t: '34–48s', img: 'gameplay-cipher.png', what: 'A boss cipher-lock: READ THE KEY legend; decode + dash the cores in order', cap: 'Every boss is a code. READ THE KEY.' },
      { n: 6, t: '48–56s', live: true, what: 'DAYBREAK ultimate fires — time slows, a screen-clearing burst of light', cap: 'Charge DAYBREAK. Break the dark.' },
      { n: 7, t: '56–66s', live: true, what: 'A near-death: LAST BREATH bullet-time second wind, clutch dash to safety', cap: "A death isn't always the end." },
      { n: 8, t: '66–80s', img: 'firstlight-winframe.png', what: 'Sovereign cracks → hard cross-fade to FIRST LIGHT: gold day, bloom halo, slow-mo', cap: 'THE LONGEST DAY.' },
      { n: 9, t: '80–88s', img: 'the-choice.png', what: 'THE CHOICE cards (hold the light / let it go) — hold a beat on the decision', cap: 'The one cipher no machine can solve.' },
      { n: 10, t: '88–90s', img: 'og-card.png', what: 'End card: logo · lancefall.pages.dev · June Solstice Jam', cap: '' },
    ];
    document.getElementById('grid').innerHTML = BEATS.map((b) => `
      <div class="beat ${b.live ? 'live' : ''}">
        <div class="thumb" ${b.img ? `style="background-image:url('${b.img}')"` : ''}></div>
        <div class="scrim"></div>
        <div class="top">
          <span class="num">BEAT ${b.n}</span>
          <span style="display:flex;gap:7px;align-items:center">
            ${b.live ? '<span class="live-tag">● LIVE CAPTURE</span>' : '<span class="have-tag">✓ HAVE FRAME</span>'}
            <span class="time">${b.t}</span>
          </span>
        </div>
        <div class="body"><div class="what">${b.what}</div>${b.cap ? `<div class="cap">"${b.cap}"</div>` : ''}</div>
      </div>`).join('');
    document.getElementById('foot').textContent = '✓ HAVE FRAME = a press/ capture exists (beats 1,2,5,8,9,10). ● LIVE CAPTURE = grab during a real run (beats 3,4,6,7: combo escalation, peak COHERENCE, DAYBREAK, LAST BREATH). Hero / itch cover = beat 8 (FIRST LIGHT).';
  </script>
</body>
</html>
