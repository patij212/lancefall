name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
        # npm install (not ci): the lockfile's platform-specific optional deps (@emnapi/* etc.)
        # resolve differently across OSes, and `npm ci`'s strict in-sync check is brittle for that.
      - run: npm install --no-audit --no-fund
      - name: Install ffmpeg (the audio gate probes the committed assets via ffprobe)
        run: sudo apt-get update && sudo apt-get install -y ffmpeg
      - name: Unit tests + typecheck (vitest runs through tsc-checked sources)
        run: npm test
      - name: Production build
        run: npm run build
      - name: Install leaderboard worker deps (for its own @cloudflare/workers-types)
        run: npm install --no-audit --no-fund
        working-directory: worker
      - name: Typecheck the leaderboard worker
        run: npx tsc --noEmit -p worker/tsconfig.json
      - name: Audio provenance / loop / budget gate
        run: npm run audio:validate
      - name: Install Playwright Chromium
        run: npx playwright install --with-deps chromium
      - name: E2E smoke (real Web-Audio path)
        run: npm run test:e2e
      - uses: actions/upload-artifact@v4
        if: ${{ !cancelled() }}
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 7
