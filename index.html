<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, maximum-scale=1" />
  <!--
    Content-Security-Policy for a same-origin Canvas/Web-Audio game on Cloudflare
    Pages with a Cloudflare Worker leaderboard. The app is an ES module, so scripts
    need only 'self' (no inline-script allowance). Fonts are self-hosted (see
    src/fonts.ts) — no Google Fonts CDN — so style/font-src stay same-origin.
      script-src 'self' blob:   — bundle + the GIF-export module Worker (Vite may blob it)
      style-src  'self' 'unsafe-inline' — bundled CSS + a few inline style.cssText overlays
      img-src    'self' data: blob:     — canvas exports, favicon data URIs, GIF frames
      media-src  'self' blob:           — same-origin audio beds + decoded WAV blobs
      connect-src 'self' https:         — the leaderboard Worker (a build-time https origin)
      worker-src 'self' blob:           — the GIF-export Worker
  -->
  <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self' blob:; style-src 'self' 'unsafe-inline'; img-src 'self' data: blob:; font-src 'self'; media-src 'self' blob:; connect-src 'self' https:; worker-src 'self' blob:; base-uri 'self'; form-action 'self'; object-src 'none'" />
  <title>LANCEFALL — neon dash-combat bullet-hell</title>
  <meta name="description" content="Your only weapon is a momentum dash. Charge, release, and spear everything in your path. Chain kills, graze bullets, survive the swarm." />
  <meta name="theme-color" content="#0e0f13" />
  <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
  <!-- PWA — installable on phones (manifest + service worker registered only on mobile, see src/mobile/pwa.ts) -->
  <link rel="manifest" href="/manifest.webmanifest" />
  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="LANCEFALL" />
  <link rel="apple-touch-icon" href="/favicon.svg" />
</head>
<body>
  <canvas id="game" role="application" aria-label="LANCEFALL — a neon dash-combat game. Charge and release to dash; played with keyboard and mouse, gamepad, or touch."></canvas>
  <div id="ui-root"></div>
  <noscript>
    <div style="position:fixed;inset:0;display:flex;align-items:center;justify-content:center;background:#0a0b0f;color:#22d3ee;font-family:system-ui,sans-serif;font-size:18px;text-align:center;padding:24px;">
      LANCEFALL needs JavaScript enabled to play. Turn it on and reload.
    </div>
  </noscript>
  <script type="module" src="/src/main.ts"></script>
</body>
</html>
